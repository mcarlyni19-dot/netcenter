<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | NetCenter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 font-sans min-h-screen flex flex-col">
    <header class="bg-slate-900 border-b border-slate-800">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-blue-500 hover:opacity-80 transition">
                <i data-lucide="globe-2" class="w-8 h-8"></i>
                <span class="text-2xl font-bold text-white tracking-tight">Net<span class="text-blue-500">Center</span></span>
            </a>
            <nav class="flex items-center gap-4 text-sm font-medium text-slate-400">
                <a href="login.html" class="text-slate-300 hover:text-white transition">Entrar</a>
                <a href="index.html" class="text-blue-500 hover:text-blue-400 transition">Voltar</a>
            </nav>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center px-6 py-12">
        <div class="w-full max-w-lg bg-slate-900 border border-slate-800 rounded-3xl shadow-2xl p-10">
            <div class="mb-8 text-center">
                <h1 class="text-3xl font-bold text-white mb-2">Cadastro</h1>
                <p class="text-slate-500">Crie sua conta para acessar as ferramentas do NetCenter.</p>
            </div>

            <form id="register-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Nome completo</label>
                    <input id="name" type="text" required placeholder="Seu nome"
                        class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-4 py-3 text-slate-100 outline-none focus:border-blue-500 transition" />
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Email</label>
                    <input id="email" type="email" required placeholder="seu@email.com"
                        class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-4 py-3 text-slate-100 outline-none focus:border-blue-500 transition" />
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Senha</label>
                    <input id="password" type="password" required placeholder="********"
                        class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-4 py-3 text-slate-100 outline-none focus:border-blue-500 transition" />
                </div>

                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-2xl transition">Criar conta</button>

                <p id="error-message" class="text-sm text-red-400 min-h-[1.25rem]"></p>
            </form>

            <p class="mt-6 text-sm text-slate-500 text-center">
                Já tem uma conta? <a href="login.html" class="text-blue-400 hover:text-blue-300">Faça login</a>
            </p>
        </div>
    </main>

    <script type="module">
        import { registrarUsuario, salvarToken } from './api/auth.js';

        const form = document.getElementById('register-form');
        const errorMessage = document.getElementById('error-message');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            errorMessage.textContent = '';

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const data = await registrarUsuario(name, email, password);
                salvarToken(data.token);
                window.location.href = 'index.html';
            } catch (error) {
                errorMessage.textContent = error.message;
            }
        });

        lucide.createIcons();
    </script>
</body>
</html>
