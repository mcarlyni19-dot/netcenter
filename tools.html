<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado da Análise | NetCenter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 font-sans min-h-screen flex flex-col">

    <header class="bg-slate-900 border-b border-slate-800">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-blue-500 hover:opacity-80 transition">
                <i data-lucide="globe-2" class="w-8 h-8"></i>
                <span class="text-2xl font-bold text-white tracking-tight">Net<span class="text-blue-500">Center</span></span>
            </a>
            <nav class="hidden md:flex gap-6 text-sm font-medium text-slate-400">
                <a href="index.html" class="hover:text-blue-400 transition">Nova Consulta</a>
            </nav>
        </div>
    </header>

    <main class="flex-1 max-w-6xl mx-auto w-full px-6 py-8">
        
        <div class="mb-8 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="index.html" class="p-2 bg-slate-900 text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition border border-slate-800">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </a>
                <div>
                    <h1 class="text-2xl font-bold text-white flex items-center gap-3">
                        Alvo: <span id="titulo-alvo" class="text-blue-400 font-mono tracking-tight">carregando...</span>
                    </h1>
                    <p class="text-sm text-slate-500 mt-1 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Análise concluída
                    </p>
                </div>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-2xl">
            <div class="p-6">
                <div class="bg-[#0A0A0A] rounded-xl p-6 font-mono text-sm text-emerald-400 h-[400px] overflow-y-auto border border-slate-800 shadow-inner">
                    <p class="text-slate-500 mb-4"># NetCenter CLI v1.0.0</p>
                    <p class="text-slate-500 mb-6">> Executando: <span id="texto-comando" class="text-blue-400">aguardando...</span></p>
                    
                    <p>Processando requisição no alvo selecionado...</p>
                    <p>Tempo de resposta: 14.230 ms</p>
                    <p class="text-white mt-4">✓ Tarefa finalizada com sucesso.</p>
                    
                    <div class="mt-4 flex items-center gap-2">
                        <span class="text-slate-500">></span>
                        <span class="w-2 h-4 bg-emerald-400 animate-pulse inline-block"></span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Lógica para capturar os parâmetros da URL
        const params = new URLSearchParams(window.location.search);
        const alvo = params.get('alvo') || 'meu-ip';
        const ferramenta = params.get('ferramenta') || 'ping';

        // Atualiza o HTML com os valores recebidos
        document.getElementById('titulo-alvo').textContent = alvo;
        document.getElementById('texto-comando').textContent = `${ferramenta} -c 4 ${alvo}`;

        lucide.createIcons();
    </script>
</body>
</html>
