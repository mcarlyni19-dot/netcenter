<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios | NetCenter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 font-sans min-h-screen flex flex-col">
    <header class="bg-slate-900 border-b border-slate-800">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-blue-500 hover:opacity-80 transition">
                <i data-lucide="globe-2" class="w-8 h-8"></i>
                <span class="text-2xl font-bold text-white tracking-tight">Net<span class="text-blue-500">Center</span></span>
            </a>
            <nav class="flex items-center gap-4 text-sm font-medium text-slate-400">
                <a href="index.html" class="text-slate-300 hover:text-white transition">Voltar</a>
            </nav>
        </div>
    </header>

    <main class="flex-1 max-w-6xl mx-auto w-full px-6 py-8">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-white mb-3">Seus Relatórios</h1>
            <p class="text-slate-500">Aqui estão os relatórios de análise de rede gerados pela sua conta.</p>
        </div>

        <div id="reports-container" class="grid gap-4">
            <p class="text-slate-500">Carregando relatórios...</p>
        </div>
    </main>

    <script type="module">
        import { listarRelatorios, obterToken } from './api/auth.js';

        const token = obterToken();
        if (!token) {
            window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`;
        }

        const container = document.getElementById('reports-container');

        async function carregarRelatorios() {
            try {
                const reports = await listarRelatorios();
                if (reports.length === 0) {
                    container.innerHTML = '<p class="text-slate-400">Nenhum relatório encontrado. Gere um relatório a partir de uma análise de rede.</p>';
                    return;
                }

                container.innerHTML = '';
                reports.forEach(report => {
                    const card = document.createElement('div');
                    card.className = 'bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-lg';
                    card.innerHTML = `
                        <div class="flex items-start justify-between gap-4 flex-col lg:flex-row">
                            <div>
                                <h2 class="text-xl font-bold text-white">${report.title}</h2>
                                <p class="text-slate-400 text-sm mt-2">Ferramenta: ${report.ferramenta} | Alvo: ${report.alvo}</p>
                                <p class="text-slate-500 text-xs mt-2">Gerado em: ${new Date(report.created_at).toLocaleString('pt-BR')}</p>
                            </div>
                            <a href="${report.pdf_path}" target="_blank" class="mt-4 inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-3 rounded-2xl transition">
                                <i data-lucide="download" class="w-4 h-4"></i>
                                Baixar PDF
                            </a>
                        </div>
                    `;
                    container.appendChild(card);
                });
                lucide.createIcons();
            } catch (error) {
                container.innerHTML = `<p class="text-red-500">Erro ao carregar relatórios: ${error.message}</p>`;
            }
        }

        carregarRelatorios();
    </script>
</body>
</html>
