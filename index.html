<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetCenter | Ferramentas de Rede</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950 text-slate-300 font-sans min-h-screen flex flex-col">

    <header class="bg-slate-900 border-b border-slate-800">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2 text-blue-500">
                <i data-lucide="globe-2" class="w-8 h-8"></i>
                <span class="text-2xl font-bold text-white tracking-tight">Net<span class="text-blue-500">Center</span></span>
            </div>
            <nav class="flex gap-4 text-sm font-medium text-slate-400 items-center">
                <div id="auth-actions" class="flex items-center gap-3">
                    <a id="btn-login" href="login.html" class="bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-xl transition">Entrar</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="flex-1 flex flex-col justify-center items-center">
        <section class="w-full max-w-4xl px-6 py-12 text-center">
            <h1 class="text-5xl md:text-6xl font-black text-white mb-6">Net<span class="text-blue-500">Center</span></h1>
            <p class="text-slate-400 mb-10 max-w-xl mx-auto text-lg">Hub centralizador de ferramentas de diagnóstico de redes.</p>

            <div class="bg-slate-900 p-2 rounded-2xl shadow-2xl border border-slate-800 flex flex-col md:flex-row gap-2 w-full mb-16">
                <div class="flex-1 flex items-center px-4 bg-slate-950 rounded-xl border border-slate-800 focus-within:border-blue-500 transition">
                    <i data-lucide="search" class="text-slate-500 w-5 h-5"></i>
                    <input type="text" id="input-alvo" placeholder="Digite um IP ou Domínio (ex: google.com)" 
                           class="w-full bg-transparent py-4 px-3 outline-none text-white font-mono">
                </div>
                <button id="btn-busca" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-xl transition flex items-center justify-center gap-2">
                    Analisar <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </div>

            <div id="ferramentas" class="w-full">
                <p class="text-xs font-bold text-slate-600 uppercase tracking-[0.2em] mb-8">Ferramentas Disponíveis</p>
                <div id="grid-ferramentas" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    </div>
            </div>
        </section>
    </main>

    <footer class="bg-slate-900 border-t border-slate-800 py-6 text-center">
        <p class="text-xs text-slate-500 uppercase font-mono tracking-widest">© 2026 NetCenter | Diagnóstico de Infraestrutura</p>
    </footer>

    <script type="module" src="main.js"></script>
</body>
</html>
