<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetCenter | Ferramentas de Rede</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950 text-slate-300 font-sans min-h-screen flex flex-col">

    <header class="bg-slate-900 border-b border-slate-800">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2 text-blue-500">
                <i data-lucide="globe-2" class="w-8 h-8"></i>
                <span class="text-2xl font-bold text-white tracking-tight">Net<span class="text-blue-500">Center</span></span>
            </div>
            <nav class="hidden md:flex gap-6 text-sm font-medium text-slate-400">
                <a href="#" class="hover:text-blue-400 transition">Início</a>
                <a href="#ferramentas" class="hover:text-blue-400 transition">Ferramentas</a>
            </nav>
        </div>
    </header>

    <main class="flex-1 flex flex-col justify-center items-center">
        <section class="w-full max-w-4xl px-6 py-12 text-center">
            <h1 class="text-5xl md:text-6xl font-black text-white mb-6">
                Net<span class="text-blue-500">Center</span>
            </h1>
            <p class="text-slate-400 mb-10 max-w-xl mx-auto text-lg">
                Hub centralizador de ferramentas de diagnóstico de redes.
            </p>

            <div class="bg-slate-900 p-2 rounded-2xl shadow-2xl border border-slate-800 flex flex-col md:flex-row gap-2 w-full mb-16">
                <div class="flex-1 flex items-center px-4 bg-slate-950 rounded-xl border border-slate-800 focus-within:border-blue-500 transition">
                    <i data-lucide="search" class="text-slate-500 w-5 h-5"></i>
                    <input type="text" id="input-alvo" placeholder="Digite um IP ou Domínio (ex: google.com)" 
                           class="w-full bg-transparent py-4 px-3 outline-none text-white font-mono">
                </div>
                <button id="btn-busca" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-xl transition flex items-center justify-center gap-2">
                    Analisar <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </div>

            <div id="ferramentas" class="w-full">
                <p class="text-xs font-bold text-slate-600 uppercase tracking-[0.2em] mb-8">Ferramentas Disponíveis</p>
                <div id="grid-ferramentas" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    </div>
            </div>
        </section>
    </main>

    <footer class="bg-slate-900 border-t border-slate-800 py-6 text-center">
        <p class="text-xs text-slate-500 uppercase font-mono tracking-widest">© 2026 NetCenter | Diagnóstico de Infraestrutura</p>
    </footer>

<script>
    async function carregarFerramentas() {
        const grid = document.getElementById('grid-ferramentas');
        const inputBusca = document.getElementById('input-alvo');

        try {
            // Ajuste para o ambiente Codespaces
            const apiUrl = window.location.origin.replace('5500', '3000') + '/ferramentas';
            const response = await fetch(apiUrl);
            const dados = await response.json();
            
            grid.innerHTML = ""; 

            dados.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-slate-900 p-6 rounded-xl border border-slate-800 hover:border-blue-500 transition-all group cursor-pointer text-left";
                
                card.innerHTML = `
                    <i data-lucide="${item.icone}" class="text-blue-500 w-6 h-6 mb-4 group-hover:scale-110 transition-transform"></i>
                    <h3 class="text-sm font-bold text-white mb-1">${item.nome}</h3>
                    <p class="text-[10px] text-slate-500 uppercase font-semibold">${item.id}</p>
                `;

                // RF03 - Navegação para Resultados
                card.addEventListener('click', () => {
                    const alvo = inputBusca.value.trim() || 'meu-ip';
                    window.location.href = `tools.html?ferramenta=${item.id}&alvo=${alvo}`;
                });

                grid.appendChild(card);
            });

            lucide.createIcons();

        } catch (erro) {
            grid.innerHTML = `<p class="text-red-500 text-xs col-span-full">Erro: Verifique o servidor JSON na porta 3000.</p>`;
        }
    }

    // Navegação via botão principal (RF03)
    document.getElementById('btn-busca').addEventListener('click', () => {
        const inputBusca = document.getElementById('input-alvo');
        const alvo = inputBusca.value.trim() || 'meu-ip';
        window.location.href = `tools.html?ferramenta=ping&alvo=${alvo}`;
    });

    document.addEventListener('DOMContentLoaded', carregarFerramentas);
</script>
</body>
</html>
